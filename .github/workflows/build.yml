name: Build instaladores

on:
  workflow_dispatch: {}
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            nome: mac
          - os: windows-latest
            nome: windows
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-build.txt

      - name: Gerar build com PyInstaller
        run: pyinstaller central_visconde.spec

      - name: Empacotar build (macOS)
        if: matrix.nome == 'mac'
        run: |
          cd dist
          zip -r -y "../ViscondeApp-mac.zip" "ViscondeApp.app"

      - name: Empacotar build (Windows)
        if: matrix.nome == 'windows'
        shell: pwsh
        run: |
          Compress-Archive -Path "dist/ViscondeApp" -DestinationPath "ViscondeApp-windows.zip"

      - uses: actions/upload-artifact@v4
        with:
          name: ViscondeApp-${{ matrix.nome }}
          path: ViscondeApp-${{ matrix.nome }}.zip

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artefatos

      - name: Criar GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artefatos/**/*.zip
